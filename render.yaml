services:
  - type: web
    name: predictive-maintenance-backend
    env: python
    plan: free
    # Use the Render-focused requirements file to avoid installing optional heavy deps
    buildCommand: pip install -r requirements_render.txt
    # Use gunicorn WSGI server in production
    startCommand: gunicorn src.api.app:app --bind 0.0.0.0:8000
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: predictive-maintenance-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port 8501 --server.headless true
    envVars:
      - key: API_URL
        # Placeholder: set this to your backend URL after deployment
        value: "https://<BACKEND_SERVICE_URL>"
    autoDeploy: true
